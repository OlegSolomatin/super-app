<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Super App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Super App">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Super App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08081C; overflow: hidden; }
    
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08081C;
      transition: opacity 0.4s ease;
    }
    
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    .splash-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7C5CFC, #9B7CFF);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .splash-logo svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    
    .splash-title {
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 32px;
    }
    
    .splash-loader {
      width: 120px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .splash-loader-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #7C5CFC, #9B7CFF);
      border-radius: 2px;
      animation: loading 1.4s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(124,92,252,0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(124,92,252,0.4); }
    }
    
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(430px); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    <div class="splash-title">Super App</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide splash only when Flutter has actually rendered its first frame.
    // This eliminates the blank-screen gap between splash and the app.
    (function() {
      var splash = document.getElementById('splash');
      var checkInterval = 200;
      var maxWait = 15000;

      function hideSplash() {
        splash.classList.add('hide');
      }

      function checkFlutter() {
        // HTML renderer uses <flt-glass-pane>, CanvasKit uses <canvas>
        var flutterApp = document.querySelector('canvas') ||
                         document.querySelector('flt-glass-pane');
        if (flutterApp) {
          requestAnimationFrame(hideSplash);
          return true;
        }
        return false;
      }

      if (!checkFlutter()) {
        var timer = setInterval(function() {
          if (checkFlutter()) {
            clearInterval(timer);
          }
        }, checkInterval);

        setTimeout(function() {
          clearInterval(timer);
          hideSplash();
        }, maxWait);
      }

      window.addEventListener('load', function() {
        setTimeout(function() {
          if (!splash.classList.contains('hide')) {
            hideSplash();
          }
        }, 1000);
      });
    })();
  </script>
</body>
</html>
